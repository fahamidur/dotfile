[colors]
background = #0d1117
background-alt = #2f363d
foreground = #d0d7de
primary = #D29922
secondary = #539bf5
alert = #D29922
disabled = #4e5b55
border = #0f2923


[bar/example]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

#font-0 = JetBrainsMono Nerd Font:size=12.5:weight=medium;3
font-0 = Roboto Mono Nerd Font:size=12.5:weight=medium;3
font-1 = FontAwesome:size=12;3
font-2 = Hack Nerd Font:size=12;3 

modules-left = memory cpu battery filesystem
modules-center = xworkspaces

modules-right = wifi bluetooth pulseaudio date hour power 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = 
label-empty-foreground = ${colors.disabled}
label-empty-padding = 0

[module/xwindow]
type = internal/xwindow
label = %title:0:75:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}


[module/battery]
type = internal/battery

battery = BAT0
adapter = ADP1

full-at = 99
low-at = 5
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = ÔČÄ  <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = 100%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

[module/lock]
type = internal/xkeyboard
;ignore :
format-margin = 2
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-indicator>
label-indicator-padding = 1
indicator-icon-0 = caps lock;-CL;+CL
label-indicator-off =
label-indicator-on = " ÔÄ£ Caps "
format-foreground = ${colors.background}
format-background = ${colors.alert}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

;;;;;;;;;;;;;;;; CENTER MODULES ;;;;;;;;;;;;;;;;

[module/hour]
type = internal/date
interval = 5
label-foreground = ${colors.foreground}
date = %l:%M %p
label = %date%
label-padding = 0
label-font = 1

[module/date]
type = custom/script
interval = 5
label-foreground = ${colors.disabled}
format = <label>
exec = "LC_TIME="en_us_utf8" date +"%a, %b %-d""
label-padding = 0
label-font = 1
click-left = gsimplecal

[module/tray]
type = internal/tray
tray-spacing = 4px


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

;;;;;;;;;;;;;;;;;;;;;;;
;  WIFI + BLUETOOTH + POWER
;;;;;;;;;;;;;;;;;;;;;;;



[module/wifi]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected = Ôáę  %{A1:nm-connection-editor:}%essid%%{A} 
label-disconnected = Ôáę  No Wi-Fi
label-connected-foreground = ${colors.primary}
label-disconnected-foreground = ${colors.disabled}

click-left = bash -c 'setsid nm-connection-editor >/dev/null 2>&1 &'
click-right = bash -c 'setsid x-terminal-emulator -e nmtui >/dev/null 2>&1 &'

[module/bluetooth]
type = custom/script


exec = bash -c 'bluetoothctl show | grep -q "Powered: yes" && (battery=$(bluetoothctl devices Connected | head -1 | awk "{print \$2}" | xargs -I {} bluetoothctl info {} 2>/dev/null | grep "Battery Percentage" | grep -oP "0x[0-9a-fA-F]+" | xargs -I {} printf "%d" {}); [[ -n "$battery" && "$battery" =~ ^[0-9]+$ ]] && echo "Ôäď On $battery%" || echo "Ôäď On") || echo "Ôäď Off"'

interval = 5
label-foreground = ${colors.secondary}

; Opens Bluetooth manager GUI on click
click-left = blueman-manager


click-right = bash -c 'state=$(bluetoothctl show | grep "Powered" | awk "{print \$2}"); if [ "$state" = "yes" ]; then bluetoothctl power off; else bluetoothctl power on; fi'



[module/power]
type = custom/menu
expand-right = true

label-open = "ÔÄĎ"
label-close = "ÔčĻ"
label-separator = " | "
label-open-foreground = ${colors.alert}

; Menu items
menu-0-0 = "ÔÄ£ Lock"
menu-0-0-exec = i3lock || xscreensaver-command -lock
menu-0-1 = "ÔčĶ Logout"
menu-0-1-exec = i3-msg exit || openbox --exit || bspc quit
menu-0-2 = "ÔÄě Reboot"
menu-0-2-exec = systemctl reboot
menu-0-3 = "ÔÄĎ Shutdown"
menu-0-3-exec = systemctl poweroff
